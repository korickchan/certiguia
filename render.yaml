# Deploy 100% gratuito no Render (sem cartão de crédito).
# Use: New → Blueprint → repo certiguia
# Se pedir cartão, use o deploy MANUAL descrito em DEPLOY.md (Web Service → Free).

services:
  - type: web
    name: certiguia
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PIX_CHAVE
        sync: false
      - key: PIX_NOME
        sync: false
      - key: PIX_CIDADE
        sync: false
      - key: CERTIFICADORA_PADRAO
        value: certisign
      - key: GUNICORN_TIMEOUT
        value: "120"
      # Sem DATABASE_URL → SQLite (cadastros podem resetar se o Render reiniciar o container)
